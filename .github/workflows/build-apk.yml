name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a version tag like v7.3.1

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build React Frontend
        run: npm run build

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android & Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Grant Execute Permission for Gradle
        run: cd android && chmod +x gradlew

      - name: Build Release APK with Gradle
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rural-Erides-GO-v7.3.1-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: "Rural ERides Go v7.3.1"
          body: "Automated cloud build for v7.3.1 release. Download and install directly on your device."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
